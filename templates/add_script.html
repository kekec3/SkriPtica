
{% extends 'index.html' %}
{% load static %}
{% block title %}
    <title>Add script</title>
{% endblock %}
{% block style %}
<link rel="stylesheet" href= "{% static 'css/script.css' %}">
<link rel="stylesheet" href="{% static 'css/navbar.css' %}">
{% endblock %}
{% block content %}
    
{% if error %}
    <div style="color: red; border: 1px solid red; padding: 10px; margin: 10px;">
        {{ error }}
    </div>
{% endif %}
    
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="Columns">
        <div class="ColumnInputs">
            <input type="text" name="naslov" class="InputAddScript" placeholder="Unesite naziv skripte!" />
            <textarea name="opis" class="textAreaOpis" placeholder="Unesite opus skripte!"></textarea>
        </div>
        <div class="ColumnDropDowns">
            <input id="inputKategorija" type="text" name="kategorija" class="InputAddScript" placeholder="Unesite kategoriju!"/>
            <input type="hidden" name="idKat" id="selected-category-id">
            
            <section class="form-module">
                <div class="form-group">
                    <div class="file-upload-wrapper">
                        <label for="file" class="file-upload-label">
                            <div class="file-upload-design">
                                <svg viewBox="0 0 640 512" height="2em">
                                    <path d="M144 480C64.5 480 0 415.5 0 336c0-62.8 40.2-116.2 96.2-135.9c-.1-2.7-.2-5.4-.2-8.1c0-88.4 71.6-160 160-160c59.3 0 111 32.2 138.7 80.2C409.9 102 428.3 96 448 96c53 0 96 43 96 96c0 12.2-2.3 23.8-6.4 34.6C596 238.4 640 290.1 640 352c0 70.7-57.3 128-128 128H144zm79-217c-9.4 9.4-9.4 24.6 0 33.9s24.6 9.4 33.9 0l39-39V392c0 13.3 10.7 24 24 24s24-10.7 24-24V257.9l39 39c9.4 9.4 24.6 9.4 33.9 0s9.4-24.6 0-33.9l-80-80c-9.4-9.4-24.6-9.4-33.9 0l-80 80z"></path>
                                </svg>
                                <p>Prevuci fajl ovde</p>
                                <p>ili</p>
                                <span class="browse-button">Odaberi sa računara</span>
                            </div>
                            <input id="file" name="fajl" type="file" accept=".pdf" required />
                        </label>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <div class="Buttons">
        <button class="ButtonSubmit" type="submit">Submit</button>
    </div>
</form>
{% endblock %}
{% block script %}
    <script src="{% static 'js/DropPDF.js' %}"></script>
    <script src="{% static 'js/DynamicSearch.js' %}"></script>
{% endblock %}
